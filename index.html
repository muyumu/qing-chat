<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="清">
  <link rel="apple-touch-icon" href="icon.png">
  <title>清</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh; height: 100dvh;
    }
    #app {
      width: 100%; max-width: 450px;
      height: 100vh; height: 100dvh;
      background: #fff;
      display: flex; flex-direction: column;
      border: 3px solid #222;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
      position: relative;
      overflow: hidden;
    }
    .header {
      background: #1a1a1a; color: white;
      padding: 10px 14px; display: flex; align-items: center; gap: 12px;
      flex-shrink: 0; z-index: 10; border-bottom: 1px solid #333;
    }
    .header .icon-btn {
      background: transparent; border: none; color: #ccc;
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      transition: all 0.2s;
    }
    .header .icon-btn:hover { background: #333; color: white; }
    .header .title-area {
      flex: 1; text-align: center; font-size: 16px; font-weight: 500; color: #ddd;
    }
    .chat-list {
      flex: 1; overflow-y: auto; padding: 15px;
      display: flex; flex-direction: column; gap: 12px;
      background-color: #f0f0f0; background-size: cover; background-position: center;
      background-repeat: no-repeat; position: relative;
      -webkit-overflow-scrolling: touch;
    }
    .chat-list::before {
      content: ''; position: absolute; top:0; left:0; right:0; bottom:0;
      background: rgba(255,255,255,0.6); z-index:0; pointer-events: none;
    }
    .chat-list > * { position: relative; z-index: 1; }
    .message { display: flex; max-width: 85%; align-items: flex-end; gap: 8px; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.assistant { align-self: flex-start; }
    .avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background-size: cover; background-position: center;
      flex-shrink: 0; cursor: pointer;
      border: 2px solid rgba(255,255,255,0.8); box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .avatar-default {
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; background: #444; color: white;
    }
    .bubble {
      padding: 10px 14px; border-radius: 18px; font-size: 15px;
      line-height: 1.5; word-break: break-word;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }
    .message.user .bubble { background: rgba(0,0,0,0.7); color: white; border-bottom-right-radius: 4px; }
    .message.assistant .bubble { background: rgba(255,255,255,0.75); color: #222; border-bottom-left-radius: 4px; }
    .message.assistant .think-bubble {
      background: rgba(200,200,200,0.5); color: #555; font-style: italic; margin-bottom: 6px;
      border-radius: 12px; padding: 8px 12px; font-size: 13px;
      border-bottom-left-radius: 4px;
    }
    .input-area {
      display: flex; align-items: center; padding: 10px 12px;
      background: #1a1a1a; border-top: 1px solid #333; gap: 8px; flex-shrink: 0;
    }
    .input-area textarea {
      flex: 1; border: 1px solid #444; border-radius: 24px;
      padding: 10px 14px; font-size: 15px; resize: none; outline: none;
      background: #2a2a2a; color: white; max-height: 100px;
    }
    .input-area textarea::placeholder { color: #888; }
    .input-area button {
      border: none; border-radius: 50%; width: 40px; height: 40px;
      font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    #bgBtn { background: #333; color: #ddd; font-size: 20px; }
    #sendBtn { background: #000; color: white; font-size: 20px; border: 1px solid #444; }
    #sendBtn:disabled { opacity: 0.3; cursor: not-allowed; }
    #thinkBtn { background: #333; color: #ddd; font-size: 18px; transition: all 0.2s; }
    #thinkBtn.active { background: #ff9800; color: white; }
    .token-bar {
      background: #111; color: #aaa; font-size: 11px; padding: 6px 12px;
      display: flex; justify-content: space-between; align-items: center;
      border-top: 1px solid #333; flex-shrink: 0;
    }
    .token-bar span { margin: 0 4px; }
    #compressToggle {
      background: #333; color: #ddd; border: none; border-radius: 12px;
      padding: 3px 10px; font-size: 11px; cursor: pointer;
    }
    #compressToggle.active { background: #4caf50; color: white; }
    .modal {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index:100;
    }
    .modal-content {
      background: #1a1a1a; width: 90%; max-width: 400px; border-radius: 16px;
      padding: 20px; display: flex; flex-direction: column; gap: 12px; color: white;
      max-height: 85vh; overflow-y: auto;
    }
    .modal-content h3 { text-align: center; margin-bottom: 4px; }
    .modal-content h4 { color: #ccc; font-size: 13px; font-weight: 500; margin-top: 8px; margin-bottom: 4px; }
    .modal-content input, .modal-content textarea {
      padding: 10px; border: 1px solid #444; border-radius: 10px;
      font-size: 14px; background: #2a2a2a; color: white;
    }
    .modal-content textarea { height: 80px; resize: vertical; }
    .modal-buttons { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
    .modal-buttons button { padding: 6px 16px; border-radius: 20px; border: none; cursor: pointer; font-size: 13px; }
    .btn-cancel { background: #444; color: #ccc; }
    .btn-save { background: #fff; color: #000; font-weight: bold; }
    .btn-delete { background: #e53935; color: white; }
    .hidden { display: none !important; }
    .empty-hint { text-align: center; color: #888; margin-top: 50%; }

    .model-card {
      display: flex; align-items: center; gap: 12px;
      background: #2a2a2a; padding: 12px; border-radius: 12px;
      border: 1px solid #444; cursor: pointer; transition: all 0.2s;
    }
    .model-card.selected { border-color: #12B7F5; background: #1e2a3a; }
    .model-card input[type="radio"] { accent-color: #12B7F5; width: 18px; height: 18px; }
    .model-card .model-name { color: white; font-size: 14px; }
    .model-card .model-badge { font-size: 11px; color: #12B7F5; margin-left: 6px; }

    .manage-list {
      display: flex; flex-direction: column; gap: 8px;
    }
    .manage-item {
      display: flex; align-items: center; gap: 8px;
      background: #2a2a2a; padding: 8px 12px; border-radius: 10px;
      border: 1px solid #444;
    }
    .manage-item span {
      flex: 1; font-size: 14px; color: white;
    }
    .manage-item button {
      background: transparent; border: none; color: #aaa; font-size: 14px; padding: 4px;
      cursor: pointer;
    }
    .manage-item button:hover { color: white; }
    .add-btn {
      background: #333; color: white; border: none; border-radius: 10px;
      padding: 8px; width: 100%; text-align: center; cursor: pointer; margin-top: 4px;
    }
  </style>
</head>
<body>
<div id="app">
  <!-- 顶部栏：用户图标、AI图标、标题、设置 -->
  <div class="header">
    <button class="icon-btn" id="personaBtn" title="用户人设">
      <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-7 8-7s8 3 8 7"/>
      </svg>
    </button>
    <button class="icon-btn" id="charBtn" title="AI 角色">
      <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none">
        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/>
      </svg>
    </button>
    <div class="title-area">清</div>
    <button class="icon-btn" id="settingsBtn" title="设置">
      <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none">
        <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
      </svg>
    </button>
  </div>
  <div class="chat-list" id="chatList">
    <div class="empty-hint">开始对话吧</div>
  </div>
  <div class="token-bar" id="tokenBar">
    <span>📊 总 Tokens: <strong id="totalTokens">0</strong></span>
    <button id="compressToggle" title="自动压缩开关">🗜️ 开启</button>
  </div>
  <div class="input-area">
    <button id="bgBtn" title="更换聊天背景">🖼️</button>
    <button id="thinkBtn" title="深度思考">🧠</button>
    <textarea id="userInput" rows="1" placeholder="输入消息..."></textarea>
    <button id="sendBtn" title="发送">➤</button>
  </div>
</div>
<input type="file" id="bgFileInput" accept="image/*" style="display:none;">
<input type="file" id="avatarFileInput" accept="image/*" style="display:none;">

<!-- 用户人设管理弹窗 -->
<div id="personaModal" class="modal hidden">
  <div class="modal-content">
    <h3>用户人设</h3>
    <div class="manage-list" id="personaList"></div>
    <button class="add-btn" id="addPersonaBtn">＋ 新增人设</button>
    <div class="modal-buttons" style="margin-top:8px;">
      <button class="btn-cancel" id="closePersonaModal">关闭</button>
    </div>
  </div>
</div>

<!-- AI 角色管理弹窗 -->
<div id="charModal" class="modal hidden">
  <div class="modal-content">
    <h3>AI 角色</h3>
    <div class="manage-list" id="charList"></div>
    <button class="add-btn" id="addCharBtn">＋ 新增角色</button>
    <div class="modal-buttons" style="margin-top:8px;">
      <button class="btn-cancel" id="closeCharModal">关闭</button>
    </div>
  </div>
</div>

<!-- 设置弹窗（模型、API Key） -->
<div id="settingsModal" class="modal hidden">
  <div class="modal-content">
    <h3>设置</h3>
    <h4>模型选择</h4>
    <div class="model-card" id="modelCardFlash" onclick="selectModel('deepseek-v4-flash')">
      <input type="radio" name="modelChoice" id="modelChoiceV4Flash" value="deepseek-v4-flash" checked>
      <span class="model-name">V4-Flash (快速模式) <span class="model-badge">推荐</span></span>
    </div>
    <div class="model-card" id="modelCardPro" onclick="selectModel('deepseek-v4-pro')" style="margin-top:6px;">
      <input type="radio" name="modelChoice" id="modelChoiceV4Pro" value="deepseek-v4-pro">
      <span class="model-name">V4-Pro (专家模式)</span>
    </div>
    <h4>API Key</h4>
    <input type="password" id="settingsApiKeyInput" placeholder="sk-xxxxxxxxxxxxxxxx">
    <div style="display:flex; gap:8px; margin-top:4px;">
      <button class="btn-cancel" id="clearSettingsKeyBtn">清除 Key</button>
      <button class="btn-save" id="saveSettingsKeyBtn">保存 Key</button>
    </div>
    <div class="modal-buttons" style="margin-top:8px;">
      <button class="btn-cancel" id="closeSettingsModal">关闭</button>
    </div>
  </div>
</div>

<!-- 人设编辑弹窗（新增/编辑用） -->
<div id="personaEditModal" class="modal hidden">
  <div class="modal-content">
    <h3 id="personaEditTitle">新增用户人设</h3>
    <input type="text" id="personaNameInput" placeholder="人设名称（如：小明）">
    <textarea id="personaPromptInput" placeholder="人设描述（如：你是一个喜欢用文言文说话的文人）"></textarea>
    <div class="modal-buttons">
      <button class="btn-delete hidden" id="deletePersonaBtn">删除</button>
      <button class="btn-cancel" id="cancelPersonaBtn">取消</button>
      <button class="btn-save" id="savePersonaBtn">保存</button>
    </div>
  </div>
</div>

<!-- AI 角色编辑弹窗（新增/编辑用） -->
<div id="charEditModal" class="modal hidden">
  <div class="modal-content">
    <h3 id="charEditTitle">新增AI角色</h3>
    <input type="text" id="charNameInput" placeholder="角色名称">
    <textarea id="charPromptInput" placeholder="系统提示"></textarea>
    <div class="modal-buttons">
      <button class="btn-delete hidden" id="deleteCharBtn">删除</button>
      <button class="btn-cancel" id="cancelCharBtn">取消</button>
      <button class="btn-save" id="saveCharBtn">保存</button>
    </div>
  </div>
</div>

<script>
  // ==================== 配置 ====================
  const API_URL = 'https://api.deepseek.com/v1/chat/completions';
  let MODEL_NAME = localStorage.getItem('selectedModel') || 'deepseek-v4-flash';
  const MAX_TOKENS = 30000;
  const KEY_STORAGE = 'user_api_key';
  let currentApiKey = localStorage.getItem(KEY_STORAGE) || '';
  let deepThink = false;
  let compressEnabled = true;

  // ==================== 数据管理 ====================
  const STORAGE_KEY = 'deepseek_chat_data';
  const PERSONA_STORAGE = 'user_personas';
  const BG_STORAGE_KEY = 'deepseek_chat_bg';
  const AVATAR_USER_KEY = 'avatar_user';
  const AVATAR_AI_KEY = 'avatar_ai';

  function loadData() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) try { return JSON.parse(raw); } catch(e) {}
    const defaultChar = { id: 'default', name: '小深', systemPrompt: '你是一个热情、有用的AI助手，名字叫小深。' };
    return { characters: [defaultChar], messages: { 'default': [] } };
  }
  function loadPersonas() {
    const raw = localStorage.getItem(PERSONA_STORAGE);
    if (raw) try { return JSON.parse(raw); } catch(e) {}
    return [{ id: 'default', name: '默认', prompt: '' }];
  }
  function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
  function savePersonas(personas) { localStorage.setItem(PERSONA_STORAGE, JSON.stringify(personas)); }

  let appData = loadData();
  let personas = loadPersonas();
  let currentCharId = appData.characters[0]?.id || null;
  let currentPersonaId = personas[0]?.id || 'default';

  // ==================== DOM 元素 ====================
  const chatList = document.getElementById('chatList');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const bgBtn = document.getElementById('bgBtn');
  const thinkBtn = document.getElementById('thinkBtn');
  const bgFileInput = document.getElementById('bgFileInput');
  const avatarFileInput = document.getElementById('avatarFileInput');
  const compressToggle = document.getElementById('compressToggle');
  const totalTokensEl = document.getElementById('totalTokens');
  let currentAvatarTarget = null;

  // 顶部按钮
  document.getElementById('personaBtn').addEventListener('click', openPersonaModal);
  document.getElementById('charBtn').addEventListener('click', openCharModal);
  document.getElementById('settingsBtn').addEventListener('click', openSettingsModal);

  // ==================== 用户人设管理弹窗 ====================
  const personaModal = document.getElementById('personaModal');
  const personaList = document.getElementById('personaList');
  document.getElementById('closePersonaModal').addEventListener('click', () => personaModal.classList.add('hidden'));
  document.getElementById('addPersonaBtn').addEventListener('click', openNewPersona);
  personaModal.addEventListener('click', e => { if(e.target === personaModal) personaModal.classList.add('hidden'); });

  function renderPersonaList() {
    personaList.innerHTML = '';
    personas.forEach(p => {
      const item = document.createElement('div');
      item.className = 'manage-item';
      const nameSpan = document.createElement('span');
      nameSpan.textContent = p.name + (p.id === currentPersonaId ? ' (当前)' : '');
      const setBtn = document.createElement('button');
      setBtn.textContent = '选用';
      setBtn.addEventListener('click', () => {
        currentPersonaId = p.id;
        renderPersonaList();
      });
      const editBtn = document.createElement('button');
      editBtn.textContent = '✎';
      editBtn.addEventListener('click', () => openEditPersona(p));
      const delBtn = document.createElement('button');
      delBtn.textContent = '✕';
      delBtn.style.color = '#e53935';
      delBtn.addEventListener('click', () => {
        if (p.id === 'default') { alert('不能删除默认人设'); return; }
        if (confirm('确定删除此用户人设吗？')) {
          personas = personas.filter(x => x.id !== p.id);
          if (currentPersonaId === p.id) currentPersonaId = personas[0]?.id || 'default';
          savePersonas(personas);
          renderPersonaList();
        }
      });
      item.appendChild(nameSpan);
      item.appendChild(setBtn);
      item.appendChild(editBtn);
      item.appendChild(delBtn);
      personaList.appendChild(item);
    });
  }
  function openPersonaModal() {
    renderPersonaList();
    personaModal.classList.remove('hidden');
  }

  // ==================== AI 角色管理弹窗 ====================
  const charModal = document.getElementById('charModal');
  const charList = document.getElementById('charList');
  document.getElementById('closeCharModal').addEventListener('click', () => charModal.classList.add('hidden'));
  document.getElementById('addCharBtn').addEventListener('click', openNewCharacter);
  charModal.addEventListener('click', e => { if(e.target === charModal) charModal.classList.add('hidden'); });

  function renderCharList() {
    charList.innerHTML = '';
    appData.characters.forEach(c => {
      const item = document.createElement('div');
      item.className = 'manage-item';
      const nameSpan = document.createElement('span');
      nameSpan.textContent = c.name + (c.id === currentCharId ? ' (当前)' : '');
      const setBtn = document.createElement('button');
      setBtn.textContent = '选用';
      setBtn.addEventListener('click', () => {
        currentCharId = c.id;
        renderCharList();
        renderMessages();
      });
      const editBtn = document.createElement('button');
      editBtn.textContent = '✎';
      editBtn.addEventListener('click', () => openEditCharacter(c));
      const delBtn = document.createElement('button');
      delBtn.textContent = '✕';
      delBtn.style.color = '#e53935';
      delBtn.addEventListener('click', () => {
        if (c.id === 'default') { alert('不能删除默认AI角色'); return; }
        if (confirm('确定删除此AI角色及其聊天记录吗？')) {
          appData.characters = appData.characters.filter(x => x.id !== c.id);
          delete appData.messages[c.id];
          if (currentCharId === c.id) currentCharId = appData.characters[0]?.id || null;
          saveData(appData);
          renderCharList();
          renderMessages();
        }
      });
      item.appendChild(nameSpan);
      item.appendChild(setBtn);
      item.appendChild(editBtn);
      item.appendChild(delBtn);
      charList.appendChild(item);
    });
  }
  function openCharModal() {
    renderCharList();
    charModal.classList.remove('hidden');
  }

  // ==================== 设置弹窗 ====================
  const settingsModal = document.getElementById('settingsModal');
  const settingsApiKeyInput = document.getElementById('settingsApiKeyInput');
  document.getElementById('saveSettingsKeyBtn').addEventListener('click', () => {
    const key = settingsApiKeyInput.value.trim();
    if (key && !key.startsWith('sk-')) { alert('API Key 应以 sk- 开头'); return; }
    localStorage.setItem(KEY_STORAGE, key);
    currentApiKey = key;
    alert('API Key 已保存');
  });
  document.getElementById('clearSettingsKeyBtn').addEventListener('click', () => {
    localStorage.removeItem(KEY_STORAGE);
    currentApiKey = '';
    settingsApiKeyInput.value = '';
    alert('API Key 已清除');
  });
  document.getElementById('closeSettingsModal').addEventListener('click', () => settingsModal.classList.add('hidden'));
  settingsModal.addEventListener('click', e => { if(e.target === settingsModal) settingsModal.classList.add('hidden'); });
  function openSettingsModal() {
    settingsApiKeyInput.value = currentApiKey;
    settingsModal.classList.remove('hidden');
  }

  // ==================== 模型选择 ====================
  window.selectModel = function(model) {
    MODEL_NAME = model;
    localStorage.setItem('selectedModel', model);
    document.querySelectorAll('.model-card').forEach(c => c.classList.remove('selected'));
    document.getElementById(model === 'deepseek-v4-flash' ? 'modelCardFlash' : 'modelCardPro').classList.add('selected');
  };
  selectModel(MODEL_NAME);

  // ==================== 人设编辑弹窗 ====================
  const personaEditModal = document.getElementById('personaEditModal');
  const personaEditTitle = document.getElementById('personaEditTitle');
  const personaNameInput = document.getElementById('personaNameInput');
  const personaPromptInput = document.getElementById('personaPromptInput');
  const deletePersonaBtn = document.getElementById('deletePersonaBtn');
  const cancelPersonaBtn = document.getElementById('cancelPersonaBtn');
  const savePersonaBtn = document.getElementById('savePersonaBtn');
  let isPersonaEditMode = false, editingPersonaId = null;

  function openNewPersona() {
    isPersonaEditMode = false; editingPersonaId = null;
    personaEditTitle.textContent = '新增用户人设';
    personaNameInput.value = ''; personaPromptInput.value = '';
    deletePersonaBtn.classList.add('hidden');
    personaEditModal.classList.remove('hidden');
  }
  function openEditPersona(p) {
    isPersonaEditMode = true; editingPersonaId = p.id;
    personaEditTitle.textContent = '编辑用户人设';
    personaNameInput.value = p.name; personaPromptInput.value = p.prompt;
    deletePersonaBtn.classList.remove('hidden');
    personaEditModal.classList.remove('hidden');
  }
  cancelPersonaBtn.addEventListener('click', () => personaEditModal.classList.add('hidden'));
  personaEditModal.addEventListener('click', e => { if(e.target === personaEditModal) personaEditModal.classList.add('hidden'); });
  savePersonaBtn.addEventListener('click', () => {
    const name = personaNameInput.value.trim();
    const prompt = personaPromptInput.value.trim();
    if (!name) { alert('请输入人设名称'); return; }
    if (isPersonaEditMode) {
      const p = personas.find(p => p.id === editingPersonaId);
      if (p) { p.name = name; p.prompt = prompt; }
    } else {
      const newId = 'p' + Date.now();
      personas.push({ id: newId, name, prompt });
      currentPersonaId = newId;
    }
    savePersonas(personas);
    renderPersonaList();
    personaEditModal.classList.add('hidden');
  });
  deletePersonaBtn.addEventListener('click', () => {
    if (editingPersonaId === 'default') { alert('不能删除默认人设'); return; }
    if (confirm('确定删除此用户人设吗？')) {
      personas = personas.filter(p => p.id !== editingPersonaId);
      if (currentPersonaId === editingPersonaId) currentPersonaId = personas[0]?.id || 'default';
      savePersonas(personas);
      renderPersonaList();
      personaEditModal.classList.add('hidden');
    }
  });

  // ==================== AI 角色编辑弹窗 ====================
  const charEditModal = document.getElementById('charEditModal');
  const charEditTitle = document.getElementById('charEditTitle');
  const charNameInput = document.getElementById('charNameInput');
  const charPromptInput = document.getElementById('charPromptInput');
  const deleteCharBtn = document.getElementById('deleteCharBtn');
  const cancelCharBtn = document.getElementById('cancelCharBtn');
  const saveCharBtn = document.getElementById('saveCharBtn');
  let isCharEditMode = false, editingCharId = null;

  function openNewCharacter() {
    isCharEditMode = false; editingCharId = null;
    charEditTitle.textContent = '新增AI角色';
    charNameInput.value = ''; charPromptInput.value = '';
    deleteCharBtn.classList.add('hidden');
    charEditModal.classList.remove('hidden');
  }
  function openEditCharacter(c) {
    isCharEditMode = true; editingCharId = c.id;
    charEditTitle.textContent = '编辑AI角色';
    charNameInput.value = c.name; charPromptInput.value = c.systemPrompt;
    deleteCharBtn.classList.remove('hidden');
    charEditModal.classList.remove('hidden');
  }
  cancelCharBtn.addEventListener('click', () => charEditModal.classList.add('hidden'));
  charEditModal.addEventListener('click', e => { if(e.target === charEditModal) charEditModal.classList.add('hidden'); });
  saveCharBtn.addEventListener('click', () => {
    const name = charNameInput.value.trim(), prompt = charPromptInput.value.trim();
    if(!name||!prompt){ alert('请填写完整'); return; }
    if(isCharEditMode){
      const c = appData.characters.find(c => c.id === editingCharId);
      if(c){ c.name = name; c.systemPrompt = prompt; }
    } else {
      const newId = 'c'+Date.now();
      appData.characters.push({ id:newId, name, systemPrompt:prompt });
      appData.messages[newId] = [];
      currentCharId = newId;
    }
    saveData(appData);
    renderCharList();
    renderMessages();
    charEditModal.classList.add('hidden');
  });
  deleteCharBtn.addEventListener('click', () => {
    if (editingCharId === 'default') { alert('不能删除默认角色'); return; }
    if (confirm('确定删除此AI角色及其聊天记录吗？')) {
      appData.characters = appData.characters.filter(c => c.id !== editingCharId);
      delete appData.messages[editingCharId];
      if (currentCharId === editingCharId) currentCharId = appData.characters[0]?.id || null;
      saveData(appData);
      renderCharList();
      renderMessages();
      charEditModal.classList.add('hidden');
    }
  });

  // ==================== 深度思考 ====================
  thinkBtn.addEventListener('click', () => {
    deepThink = !deepThink;
    thinkBtn.classList.toggle('active', deepThink);
  });

  // ==================== 压缩开关 ====================
  compressToggle.addEventListener('click', () => {
    compressEnabled = !compressEnabled;
    compressToggle.textContent = compressEnabled ? '🗜️ 开启' : '🗜️ 关闭';
    compressToggle.classList.toggle('active', compressEnabled);
  });

  // ==================== 背景与头像 ====================
  function loadBackground() {
    const savedBg = localStorage.getItem(BG_STORAGE_KEY);
    if (savedBg) chatList.style.backgroundImage = `url(${savedBg})`;
  }
  function loadAvatar(role, element) {
    const key = role === 'user' ? AVATAR_USER_KEY : AVATAR_AI_KEY;
    const saved = localStorage.getItem(key);
    if (saved) {
      element.style.backgroundImage = `url(${saved})`;
      element.classList.remove('avatar-default');
      element.textContent = '';
    } else {
      element.classList.add('avatar-default');
      element.style.backgroundImage = '';
      element.textContent = role === 'user' ? '我' : '🤖';
    }
  }
  function createAvatar(role) {
    const avatar = document.createElement('div');
    avatar.className = 'avatar avatar-default';
    avatar.textContent = role === 'user' ? '我' : '🤖';
    loadAvatar(role, avatar);
    avatar.addEventListener('click', (e) => {
      e.stopPropagation();
      currentAvatarTarget = role;
      avatarFileInput.click();
    });
    return avatar;
  }
  bgBtn.addEventListener('click', () => bgFileInput.click());
  bgFileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      localStorage.setItem(BG_STORAGE_KEY, ev.target.result);
      chatList.style.backgroundImage = `url(${ev.target.result})`;
    };
    reader.readAsDataURL(file);
    bgFileInput.value = '';
  });
  avatarFileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const key = currentAvatarTarget === 'user' ? AVATAR_USER_KEY : AVATAR_AI_KEY;
      localStorage.setItem(key, ev.target.result);
      renderMessages();
    };
    reader.readAsDataURL(file);
    avatarFileInput.value = '';
  });

  // ==================== Token 统计与压缩 ====================
  function estimateTokens(text) { return Math.ceil(text.length / 2); }
  function getMessageTokens(msg) {
    const chars = (msg.content||'').length + (msg.think||'').length;
    const tokens = estimateTokens(msg.content) + estimateTokens(msg.think);
    return { chars, tokens };
  }
  function getTotalTokens(messages) {
    let total = 0;
    messages.forEach(m => { total += getMessageTokens(m).tokens; });
    return total;
  }
  function compressHistory(msgs) {
    const systemMsg = msgs.find(m => m.role === 'system');
    const others = msgs.filter(m => m.role !== 'system');
    if (others.length <= 20) return msgs;
    const trimmed = others.slice(-20);
    const notice = { role: 'assistant', content: '（之前的对话过长，已自动压缩）', think: '' };
    return [systemMsg, notice, ...trimmed].filter(Boolean);
  }

  function renderMessages() {
    chatList.innerHTML = '';
    const msgs = appData.messages[currentCharId] || [];
    if (!msgs.length) { chatList.innerHTML = '<div class="empty-hint">开始对话吧</div>'; updateTokenBar(); return; }
    msgs.forEach(m => {
      const div = document.createElement('div'); div.className = `message ${m.role}`;
      const av = createAvatar(m.role);
      div.appendChild(av);
      if (m.role === 'assistant' && m.think) {
        const thinkBub = document.createElement('div');
        thinkBub.className = 'think-bubble';
        thinkBub.textContent = '💭 ' + m.think;
        div.appendChild(thinkBub);
      }
      const bubWrap = document.createElement('div');
      const bub = document.createElement('div');
      bub.className = 'bubble';
      bub.textContent = m.content || '';
      bubWrap.appendChild(bub);
      const stats = getMessageTokens(m);
      const statSpan = document.createElement('div');
      statSpan.style.cssText = 'font-size:10px; color:#888; margin-top:2px; text-align:right;';
      statSpan.textContent = `📝 ${stats.chars} 字 | 🔤 ${stats.tokens} tokens`;
      bubWrap.appendChild(statSpan);
      div.appendChild(bubWrap);
      chatList.appendChild(div);
    });
    chatList.scrollTop = chatList.scrollHeight;
    updateTokenBar();
  }
  function updateTokenBar() {
    const msgs = appData.messages[currentCharId] || [];
    totalTokensEl.textContent = getTotalTokens(msgs);
  }

  // ==================== 发送消息 ====================
  async function sendMessage() {
    if (!currentApiKey) {
      alert('请先设置 API Key！点击顶部 ⚙️ 按钮。');
      return;
    }
    const content = userInput.value.trim();
    if(!content || !currentCharId) return;
    if(!appData.messages[currentCharId]) appData.messages[currentCharId] = [];

    const personaPrompt = personas.find(p => p.id === currentPersonaId)?.prompt || '';
    let userMsgContent = content;
    if (personaPrompt) {
      userMsgContent = `[用户人设：${personaPrompt}]\n${content}`;
    }
    appData.messages[currentCharId].push({ role:'user', content: userMsgContent });
    saveData(appData); renderMessages(); userInput.value = ''; userInput.style.height = 'auto';
    sendBtn.disabled = true; userInput.disabled = true;

    const assistantMsg = { role:'assistant', content: '', think: '' };
    appData.messages[currentCharId].push(assistantMsg);
    renderMessages();

    try {
      const system = appData.characters.find(c => c.id === currentCharId)?.systemPrompt || '';
      let messages = [
        { role:'system', content: system },
        ...appData.messages[currentCharId].filter(m => m.role !== 'system' && m.content !== '')
      ];
      if (compressEnabled && getTotalTokens(messages) > MAX_TOKENS) {
        messages = compressHistory(messages);
      }
      const body = {
        model: MODEL_NAME,
        messages: messages.map(({ role, content }) => ({ role, content })),
        stream: true
      };
      if (deepThink) body.reasoning_effort = 'high';

      const res = await fetch(API_URL, {
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'Authorization': `Bearer ${currentApiKey}`
        },
        body: JSON.stringify(body)
      });
      if(!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      while(true) {
        const {done, value} = await reader.read();
        if(done) break;
        buffer += decoder.decode(value, {stream:true});
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for(const line of lines) {
          const trimmed = line.trim();
          if(!trimmed || !trimmed.startsWith('data: ')) continue;
          const dataStr = trimmed.slice(6);
          if(dataStr === '[DONE]') break;
          try {
            const parsed = JSON.parse(dataStr);
            const delta = parsed.choices?.[0]?.delta;
            if (delta.reasoning_content) assistantMsg.think = (assistantMsg.think||'') + delta.reasoning_content;
            if (delta.content) assistantMsg.content += delta.content;
            renderMessages();
          } catch(e) {}
        }
      }
      if (!assistantMsg.content && !assistantMsg.think) appData.messages[currentCharId].pop();
    } catch(e) {
      alert('请求失败: ' + e.message);
      appData.messages[currentCharId].pop();
    } finally {
      saveData(appData); renderMessages();
      sendBtn.disabled = false; userInput.disabled = false; userInput.focus();
    }
  }

  // ==================== 事件绑定 ====================
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 100) + 'px';
  });
  userInput.addEventListener('keydown', e => {
    if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  sendBtn.addEventListener('click', sendMessage);

  // ==================== 启动 ====================
  loadBackground();
  renderMessages();
  if(currentCharId) userInput.focus();
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(()=>{});
    });
  }
</script>
</body>
</html>
